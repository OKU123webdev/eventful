<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}My Event{% endblock %}</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Purple+Purse&family=Playfair+Display&family=Lato:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Parisienne&display=swap"
      rel="stylesheet"
    />

    {% block api %}{% endblock %}
    <!-- CSS -->
    <link
      rel="stylesheet"
      type="text/css"
      href="{{ url_for('static', filename='styles.css') }}"
    />
  </head>

  <body>
    <!-- logout btn -->
    <a href="{{ url_for('logout') }}" class="logout">Logout</a>
    
    <!-- main content -->
    <main class="new-event">
      <div class="card-frame">
        <div class="cream-card animate">
          <!-- ROW -->
          <div class="row h-100 g-0">
            <!-- LEFT COLUMN -->
            <div class="d-none d-lg-block col-lg-4">
              <!-- image -->
              <div class="left-image">
                <img
                  src="{% block left_img %}{{ url_for('static', filename='images/new-event-1.jpg') }}{% endblock %}"
                  alt="Event image"
                />
              </div>
            </div>

            <!-- RIGHT COLUMN  -->
            <div class="col-12 col-lg-8">
              <div class="right-content">
                <div class="right-wrap {% block center %}{% endblock %}">
                  <!-- step -->
                  {% block steps %}
                    <div class="step-nav mb-2">
                      <span class="step-count">Step {{ step }} of 3</span>
                      <span class="step-item {% if step == 1 %}active{% endif %}">
                        Event Type
                      </span>
                      <span class="step-item {% if step == 2 %}active{% endif %}">
                        Event Details
                      </span>
                      <span class="step-item {% if step == 3 %}active{% endif %}">
                        To-Do List
                      </span>
                    </div>
                    <!-- divider -->
                    <hr>
                  {% endblock  %}
                  
                  <!-- heading -->
                  <h1 class="newEvent_title mb-3">
                    {% block events_heading %}MY EVENTS{% endblock %}
                  </h1>
                  
                  <!-- right content -->
                  {% block event_content %}{% endblock %}
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>

  {% block scripts %} {% endblock %}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</html>
